services:
  # ---------------------------------------------------------------------------
  # Prometheus — scrapes Ray's per-node metrics agents via the service
  # discovery file that the Ray head writes to /tmp/ray.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Ray writes prom_metrics_service_discovery.json here on the head node.
      # Mount read-only so Prometheus can auto-discover every Ray node.
      - /tmp/ray:/tmp/ray:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - monitoring
    extra_hosts:
      # Lets containers reach services bound to the host (e.g. node_exporter
      # or the Ray head) via host.docker.internal on Linux.
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------------
  # Grafana — loads the Prometheus datasource and Ray's auto-generated
  # dashboards (Ray writes them under /tmp/ray/session_latest/metrics/grafana).
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # Allow embedding Grafana panels inside the Ray dashboard iframe.
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/tmp/ray/session_latest/metrics/grafana/dashboards/default_grafana_dashboard.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Ray's generated dashboard JSON lives here; provisioning points at it.
      - /tmp/ray:/tmp/ray:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # node_exporter — host-level metrics (CPU, RAM, disk, network) for the node
  # this stack runs on. Deploy one per machine if you want full-cluster host
  # metrics, then add the targets to prometheus.yml.
  # ---------------------------------------------------------------------------
  node_exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
