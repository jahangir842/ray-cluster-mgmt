apiVersion: 1

providers:
  # Ray auto-generates its Grafana dashboards (cluster, serve, train, data,
  # etc.) into this directory when the head node starts. Grafana watches the
  # folder and picks up new/updated dashboards automatically.
  - name: "Ray default dashboards"
    folder: "Ray"
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /tmp/ray/session_latest/metrics/grafana/dashboards
      foldersFromFilesStructure: false

  # Dedicated folder for the vLLM serving dashboard (metrics from vLLM's own
  # /metrics endpoint, scraped by the "vllm" Prometheus job).
  - name: "vLLM dashboards"
    folder: "vLLM"
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/vllm

  # Drop any of your own dashboard JSON files into ./grafana/provisioning/dashboards/custom/.
  - name: "Custom dashboards"
    folder: "Custom"
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/custom
