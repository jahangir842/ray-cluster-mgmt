# Single-host mode: head + N workers in a bridge network.
# Good for local dev, CI, and demos on one machine.
#
# Usage:
#   cp .env.example .env && vim .env
#   docker compose build
#   docker compose up -d
#   docker compose up -d --scale ray-worker=5   # scale workers at runtime
#   docker compose exec ray-head ray status

name: ray-cluster

services:

  # ── Head Node ──────────────────────────────────────────────────────────────
  ray-head:
    build:
      context: .
      args:
        BASE_IMAGE: ${BASE_IMAGE:-rayproject/ray:2.47.0-py311}
    container_name: ray-head
    hostname: ray-head
    ports:
      - "${RAY_GCS_PORT:-6379}:6379"
      - "${RAY_DASHBOARD_PORT:-8265}:8265"
      - "${RAY_CLIENT_PORT:-10001}:10001"
    environment:
      NCCL_SOCKET_IFNAME: ${NCCL_SOCKET_IFNAME:-eth0}
      GLOO_SOCKET_IFNAME: ${GLOO_SOCKET_IFNAME:-eth0}
    volumes:
      - ../../examples:/app/examples:ro
      - ray-tmp:/tmp/ray
      - ${SHARED_STORAGE_PATH:-/tmp/cluster_storage}:/mnt/cluster_storage
    networks:
      - ray-net
    command: >
      ray start --head
        --port=6379
        --dashboard-port=8265
        --num-cpus=${HEAD_NUM_CPUS:-4}
        --object-store-memory=${HEAD_OBJECT_STORE_MEMORY:-4000000000}
        --block
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Worker Nodes ───────────────────────────────────────────────────────────
  ray-worker:
    build:
      context: .
      args:
        BASE_IMAGE: ${BASE_IMAGE:-rayproject/ray:2.47.0-py311}
    depends_on:
      ray-head:
        condition: service_healthy
    environment:
      NCCL_SOCKET_IFNAME: ${NCCL_SOCKET_IFNAME:-eth0}
      GLOO_SOCKET_IFNAME: ${GLOO_SOCKET_IFNAME:-eth0}
    volumes:
      - ../../examples:/app/examples:ro
      - ray-tmp:/tmp/ray
      - ${SHARED_STORAGE_PATH:-/tmp/cluster_storage}:/mnt/cluster_storage
    networks:
      - ray-net
    command: >
      ray start
        --address=ray-head:6379
        --num-cpus=${WORKER_NUM_CPUS:-4}
        --object-store-memory=${WORKER_OBJECT_STORE_MEMORY:-4000000000}
        --block
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-2}

networks:
  ray-net:
    driver: bridge

volumes:
  ray-tmp:
